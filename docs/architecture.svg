<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="840" viewBox="0 0 1280 840" role="img" aria-labelledby="title desc">
  <title id="title">Jakal-Net Progressive-B Query-Block Architecture</title>
  <desc id="desc">A diagram showing byte BPE tokenization, Progressive-B S and B latent workspaces, query transition, query propagation, query head prediction, and auxiliary specialization losses.</desc>
  <defs>
    <style>
      .bg { fill: #f6f1e7; }
      .panel { fill: #fffaf0; stroke: #1f2933; stroke-width: 2; rx: 18; }
      .box { fill: #ffffff; stroke: #1f2933; stroke-width: 2; rx: 14; }
      .sbox { fill: #e7f4ef; stroke: #1f2933; stroke-width: 2; rx: 14; }
      .bbox { fill: #ffe9d2; stroke: #1f2933; stroke-width: 2; rx: 14; }
      .qbox { fill: #e8eef8; stroke: #1f2933; stroke-width: 2; rx: 14; }
      .loss { fill: #fff4c7; stroke: #b45309; stroke-width: 1.6; rx: 12; }
      .title { font: 800 28px Verdana, sans-serif; fill: #111827; }
      .subtitle { font: 500 16px Verdana, sans-serif; fill: #475569; }
      .label { font: 700 18px Verdana, sans-serif; fill: #111827; }
      .small { font: 500 15px Verdana, sans-serif; fill: #334155; }
      .mono { font: 600 14px Consolas, monospace; fill: #263238; }
      .arrow { stroke: #1f2933; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrowSoft); }
    </style>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L10,5.5 L0,11 Z" fill="#1f2933"/>
    </marker>
    <marker id="arrowSoft" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L10,5.5 L0,11 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="840"/>
  <text class="title" x="48" y="55">Jakal-Net Progressive-B Query-Block LM</text>
  <text class="subtitle" x="48" y="82">Query slots are the only prediction path. No legacy LM head and no GRU response decoder.</text>

  <rect class="panel" x="42" y="118" width="285" height="220"/>
  <text class="label" x="66" y="152">Data and tokenizer</text>
  <rect class="box" x="66" y="176" width="236" height="48"/>
  <text class="small" x="84" y="206">mixed JSONL / text corpus</text>
  <rect class="box" x="66" y="242" width="236" height="52"/>
  <text class="small" x="84" y="266">byte-level BPE</text>
  <text class="mono" x="84" y="286">4k to 16k+ vocab</text>
  <text class="mono" x="78" y="320">code + LaTeX stay byte-safe</text>

  <rect class="panel" x="370" y="118" width="540" height="500"/>
  <text class="label" x="398" y="152">Progressive-B encoder</text>
  <text class="subtitle" x="398" y="177">S is sequence workspace; B is compressed/expanded latent memory.</text>

  <rect class="sbox" x="410" y="212" width="180" height="62"/>
  <text class="label" x="436" y="240">S init</text>
  <text class="small" x="436" y="262">token + position</text>
  <rect class="sbox" x="642" y="212" width="210" height="62"/>
  <text class="label" x="670" y="240">S warmup</text>
  <text class="small" x="670" y="262">window propagation</text>

  <rect class="bbox" x="410" y="326" width="442" height="202"/>
  <text class="label" x="436" y="358">Progressive-B joint blocks</text>
  <text class="small" x="436" y="384">lite / mid / full stages repeat these routes</text>
  <rect class="box" x="436" y="412" width="142" height="42"/>
  <text class="mono" x="464" y="439">S prop</text>
  <rect class="box" x="618" y="412" width="198" height="42"/>
  <text class="mono" x="648" y="439">compressed B</text>
  <rect class="box" x="436" y="476" width="142" height="36"/>
  <text class="mono" x="466" y="500">S -&gt; B</text>
  <rect class="box" x="618" y="476" width="198" height="36"/>
  <text class="mono" x="642" y="500">B expand / compress</text>

  <rect class="sbox" x="500" y="556" width="250" height="44"/>
  <text class="label" x="540" y="585">Final S refinement</text>

  <path class="arrow" d="M327 232 C352 232 372 232 410 243"/>
  <path class="arrow" d="M590 243 L642 243"/>
  <path class="arrow" d="M747 274 C747 310 690 318 630 326"/>
  <path class="arrow" d="M630 528 C630 540 630 548 630 556"/>
  <path class="soft" d="M578 433 C596 424 602 424 618 433"/>
  <path class="soft" d="M618 494 C600 505 596 505 578 494"/>

  <rect class="panel" x="952" y="118" width="280" height="354"/>
  <text class="label" x="980" y="152">Query prediction path</text>
  <rect class="qbox" x="980" y="184" width="220" height="58"/>
  <text class="label" x="1004" y="214">Query slots</text>
  <text class="small" x="1004" y="235">one slot per future token</text>
  <rect class="qbox" x="980" y="270" width="220" height="58"/>
  <text class="label" x="1004" y="300">Query transition</text>
  <text class="small" x="1004" y="321">S routes into queries</text>
  <rect class="qbox" x="980" y="356" width="220" height="58"/>
  <text class="label" x="1004" y="386">Query propagation</text>
  <text class="small" x="1004" y="407">left-to-right query update</text>
  <rect class="qbox" x="980" y="442" width="220" height="48"/>
  <text class="label" x="1004" y="473">Query head to logits</text>

  <path class="arrow" d="M750 578 C872 578 920 213 980 213"/>
  <path class="arrow" d="M1090 242 L1090 270"/>
  <path class="arrow" d="M1090 328 L1090 356"/>
  <path class="arrow" d="M1090 414 L1090 442"/>

  <rect class="panel" x="80" y="405" width="250" height="190"/>
  <text class="label" x="108" y="438">Execution</text>
  <rect class="box" x="108" y="464" width="194" height="38"/>
  <text class="small" x="132" y="489">reference / streaming</text>
  <rect class="box" x="108" y="518" width="194" height="38"/>
  <text class="small" x="132" y="543">kernel / native CUDA</text>
  <path class="soft" d="M330 506 C360 478 382 442 410 428"/>

  <rect class="panel" x="370" y="662" width="862" height="118"/>
  <text class="label" x="398" y="696">Losses and TensorBoard</text>
  <rect class="loss" x="398" y="716" width="232" height="44"/>
  <text class="small" x="418" y="744">main query-block CE</text>
  <rect class="loss" x="650" y="716" width="260" height="44"/>
  <text class="small" x="670" y="744">B cosine duplicate penalty</text>
  <rect class="loss" x="930" y="716" width="270" height="44"/>
  <text class="small" x="950" y="744">route / edge concentration cap</text>
  <text class="mono" x="398" y="804">TB scalars: train/minibatch_loss + overlaid train/minibatch_ppl_by_distance buckets</text>
</svg>
